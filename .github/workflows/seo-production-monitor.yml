name: Production SEO Monitor

# bridgelogis.com (production) 대상 Lighthouse SEO 모니터링.
# - main push 직후 (자동 회귀 감지)
# - 매주 일요일 17:00 UTC = 월요일 02:00 KST baseline (drift 추적)
# - 수동 실행 (workflow_dispatch)
#
# Preview 환경(Vercel auto noindex)에서 SEO 0.90 달성이 불가능하므로
# preview-lighthouse(seo-checks.yml)는 warn 처리, 본 워크플로가 production
# 도메인 대상으로 SEO error 게이트를 강제한다.
#
# 회귀 발생 시 GitHub Issue 자동 생성 (sticky title, 같은 날 중복 방지).

on:
  push:
    branches: [main]
  schedule:
    # cron: '분 시 일 월 요일' (UTC). 일요일 17:00 UTC = 월요일 02:00 KST.
    - cron: '0 17 * * 0'
  workflow_dispatch: {}

# Issue 생성 권한 + checkout 권한 (최소권한 원칙).
permissions:
  contents: read
  issues: write

# 동일 이름 in-progress 잡이 있으면 신규 트리거 시 cancel
# (push + schedule 가까이 발생할 때 race 방지).
concurrency:
  group: production-seo
  cancel-in-progress: false

jobs:
  lighthouse-prod:
    name: Lighthouse on bridgelogis.com
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # push trigger 일 때만 — Vercel auto-deploy 가 production 갱신할 시간 + live 확인.
      # schedule/manual 트리거에서는 production 이 항상 ready 가정하므로 skip.
      - name: Wait for Vercel production deploy
        if: github.event_name == 'push'
        run: |
          # Vercel auto-deploy 평균 30-60초. 90초 sleep + 10초 간격 폴링 5분 timeout.
          sleep 90
          for i in $(seq 1 30); do
            code=$(curl -sI -o /dev/null -w '%{http_code}' https://bridgelogis.com/)
            if [ "$code" = "200" ]; then
              echo "✓ bridgelogis.com is live (HTTP $code, attempt $i)"
              exit 0
            fi
            echo "attempt $i: HTTP $code, retrying in 10s..."
            sleep 10
          done
          echo "::warning::production not ready after 5min — proceeding anyway (lighthouse may report ERRORED_DOCUMENT_REQUEST)"

      - name: Lighthouse on production
        id: lh
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://bridgelogis.com/
            https://bridgelogis.com/quote
            https://bridgelogis.com/guide
          configPath: ./lighthouserc.production.json
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Open issue on regression
        if: failure() && steps.lh.conclusion == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            const titlePrefix = '🚨 Production SEO regression';
            const todayTitle = `${titlePrefix} — ${today}`;

            // Idempotency: 같은 날 이미 issue 가 열려 있으면 신규 생성 스킵.
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'seo,regression,auto',
              per_page: 30,
            });
            const dup = existing.data.find(i => i.title === todayTitle);
            if (dup) {
              core.info(`Issue already exists today: #${dup.number}`);
              return;
            }

            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const sha = context.sha.slice(0, 7);
            const trigger = context.eventName;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: todayTitle,
              body: [
                `Lighthouse SEO score dropped below threshold on **bridgelogis.com**.`,
                ``,
                `- **Trigger**: \`${trigger}\``,
                `- **Commit**: \`${sha}\``,
                `- **Run**: ${runUrl}`,
                `- **Threshold**: \`categories:seo >= 0.90\` (error)`,
                ``,
                `## Next steps`,
                `1. Run 의 **Artifacts** 에서 lhci 리포트 다운로드 → 어느 SEO audit 이 실패했는지 확인`,
                `2. 회귀 원인 진단 (meta tags / robots.txt / sitemap.xml / JSON-LD / canonical 등)`,
                `3. Fix 적용 후 main 에 push → 본 워크플로 자동 재실행 → PASS 시 본 issue 수동 close`,
                ``,
                `⚠️ false positive 가능성: bridgelogis.com 일시 다운 시 ERRORED_DOCUMENT_REQUEST 로 score 측정 자체 실패. Run 로그에서 production live 여부 확인 필요.`,
                ``,
                `_Auto-created by \`.github/workflows/seo-production-monitor.yml\` — sticky title 로 같은 날 중복 생성되지 않습니다._`,
              ].join('\n'),
              labels: ['seo', 'regression', 'auto'],
            });

            core.info(`Created new issue with title: ${todayTitle}`);
